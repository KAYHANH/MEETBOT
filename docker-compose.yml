version: '3.8'

services:
  mongodb:
    image: mongo:7-alpine
    container_name: meetbot-db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\""]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: node:20-alpine
    container_name: meetbot-app
    working_dir: /app
    command: sh -c "npm ci && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - meetbot_node_modules:/app/node_modules
    env_file:
      - .env
    environment:
      APP_URL: http://localhost:3000
      PORT: 3000
      NODE_ENV: development
      VITE_API_URL: /api
      MONGODB_URI: mongodb://mongodb:27017/meetbot
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
  meetbot_node_modules:
